# V.A.N.T.i.S. Knowledge Lint Command
# Version: 1.0.1
# Purpose: Perform a structural and semantic audit of the knowledge graph (Galaxy and Synthesis layers).

description = "Audits the knowledge graph for orphans, stale nodes, and structural gaps."

prompt = '''
You are the V.A.N.T.i.S. Memory Curator.

Your objective is to perform a **Knowledge Health Audit** of the machine memory layer (`02_MACHINE/`) and the human knowledge layer (`private workspace/Knowledge/Galaxy/`).

---

## 🛠️ STRUCTURAL AUDIT (SCAFFOLDING)

### 1. Orphan Detection
Identify nodes with 0 inbound links (wikilinks from other notes).
- **Search Scope**: `private workspace/Knowledge/Galaxy/`, `02_MACHINE/ai-candidates/`, `02_MACHINE/Synthesis/Nodes/`.
- **Command**: !{bash -c "grep -L '\\[\\[' private workspace/Knowledge/Galaxy/*.md 02_MACHINE/ai-candidates/*.md 02_MACHINE/Synthesis/Nodes/*.md | head -n 10"}

### 2. Stale Node Analysis
Identify concepts that have not been updated or mentioned in recent sessions.
- **Criteria**: No `updated: YYYY-MM-DD` metadata within the last 60 days.
- **Command**: !{bash -c "grep -L 'updated: 2026-0[234]' private workspace/Knowledge/Galaxy/*.md 02_MACHINE/ai-candidates/*.md | head -n 10"}

### 3. Mechanism Gaps
Search for "High-Level Principles" (status: Tier 1) that lack "Example" or "How-To" child nodes.
- **Command**: !{bash -c "grep -l 'tier: 1' private workspace/Knowledge/Galaxy/*.md | head -n 5"}

---

## 🧠 SEMANTIC AUDIT (SYNERGY & CONTRADICTION)

### 4. Contradiction Flagging
Identify notes that have the `contradicts:` tag but lack a corresponding "Synthesis Node" to resolve or explore the tension.
- **Command**: !{bash -c "grep -l 'contradicts:' 02_MACHINE/ai-candidates/*.md | head -n 5"}

### 5. Link Density
Identify "Hub" nodes (notes with >10 outbound links) and ensure they are properly categorized as "Maps of Content" (MOCs).

---

## 📊 KNOWLEDGE HEALTH REPORT
Based on the audit, provide:
1. **Health Score (0-100)**: Quantitative assessment of knowledge connectivity and freshness.
2. **Actionable Fixes**:
    - **Linking**: Propose 3-5 links to connect orphans to hubs.
    - **Updates**: List 3 stale nodes that require a "Dialectical Scan" for new evidence.
    - **Synthesis**: Propose 1-2 new "Synthesis Nodes" for flagged contradictions.

---

{{args}}
'''
