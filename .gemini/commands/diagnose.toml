# V.A.N.T.i.S. Diagnostic Command
# Version: 1.1.0 (Hybrid Upgrade)
# Purpose: Run a system health check to identify performance bottlenecks, protocol drift, and vault hygiene issues.

description = "Executes a technical health check of the V.A.N.T.i.S. vault protocols, metadata, and performance."

prompt = """
You are the V.A.N.T.i.S. System Auditor.

Your objective is to perform a **Hybrid System Diagnostic** to ensure the vault is operationally sound and performing efficiently.

---

## 🛠️ INFRASTRUCTURE PASS (VITAL SIGNS)
The following is the output from the low-level system diagnostic hook:

!{bash .gemini/hooks/v_diagnose.sh}

---

## 🧠 INTELLIGENCE PASS (CONTEXT & PROTOCOLS)

### 1. Context Debt Analysis
- **Model Role**: Gemini (Intelligence Layer)
- **Session History Size**: (Analyze your current context length)
- **Token Efficiency**: (Identify if repetitive data is bloating the context)

### 2. Protocol Integrity (Metadata v1.5)
- **Recent Audit Scan**: !{ls -t 02_MACHINE/Daily/*.md | head -n 1 | xargs cat | head -n 20}
- **Validation**: Does the latest audit file follow the Metadata v1.5 schema? (Check for tags, parent-links, status, version).

### 3. Knowledge Drift
- **Inbox Hygiene**: !{ls 01_HUMAN/Inbox/ | wc -l} items pending.
- **Candidate Layer**: !{ls 02_MACHINE/ai-candidates/ | wc -l} candidates awaiting review.

---

## 📊 OPERATIONAL HEALTH SCORE
Based on the Infrastructure and Intelligence passes, provide:
1. **Health Score (0-100)**: A quantitative assessment of system readiness.
2. **Critical Issues**: (List any [FAIL] or [WARN] states from the shell output).
3. **Recommended Optimizations**: (e.g., "/compact required", "ASV Reflex fix needed", "Inbox cleanup").

---

{{args}}
"""
